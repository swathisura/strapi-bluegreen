name: Strapi Blue/Green Deploy

on:
  push:
    branches:
      - main
      - develop

env:
  AWS_REGION: us-east-1
  CONTAINER_NAME: strapi

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment variables based on branch
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV=prod" >> $GITHUB_ENV
            echo "ECR_REPO=strapi-prod" >> $GITHUB_ENV
            echo "ECS_CLUSTER=strapi-prod-cluster" >> $GITHUB_ENV
            echo "ECS_SERVICE=strapi-prod-service" >> $GITHUB_ENV
            echo "CD_APP=strapi-prod-codedeploy" >> $GITHUB_ENV
            echo "CD_GROUP=strapi-prod-dg" >> $GITHUB_ENV
          else
            echo "ENV=dev" >> $GITHUB_ENV
            echo "ECR_REPO=strapi-dev" >> $GITHUB_ENV
            echo "ECS_CLUSTER=strapi-dev-cluster" >> $GITHUB_ENV
            echo "ECS_SERVICE=strapi-dev-service" >> $GITHUB_ENV
            echo "CD_APP=strapi-dev-codedeploy" >> $GITHUB_ENV
            echo "CD_GROUP=strapi-dev-dg" >> $GITHUB_ENV
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: taskdef.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS via CodeDeploy Blue/Green
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          codedeploy-appspec: appspec.yml
          codedeploy-application: ${{ env.CD_APP }}
          codedeploy-deployment-group: ${{ env.CD_GROUP }}
